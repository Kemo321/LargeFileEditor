repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^extern/
      - id: end-of-file-fixer
        exclude: ^extern/
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=5000']

  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        entry: bash -c 'CF=$(command -v clang-format-15 || command -v clang-format); $CF --style=file -i "$@"' --
        language: system
        files: ^(src|include|tests)/.*\.(cc|h|cpp|hpp)$
        exclude: ^extern/

      - id: cmake-format
        name: cmake-format
        entry: cmake-format -i
        language: python
        additional_dependencies: [cmakelang]
        files: (CMakeLists\.txt|\.cmake)$
        exclude: ^extern/

      - id: cmake-configure
        name: cmake configure
        entry: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        language: system
        pass_filenames: false
        always_run: true

      - id: cppcheck
        name: cppcheck
        entry: cppcheck --enable=all --suppressions-list=.cppcheck_suppressions --error-exitcode=1 -I include/ src/ tests/ -i extern/
        language: system
        pass_filenames: false
        always_run: true

      - id: clang-tidy
        name: clang-tidy
        entry: clang-tidy -p build --fix --quiet
        language: system
        files: ^(src|tests)/.*\.(cc|cpp)$
        exclude: ^extern/

      - id: build-project
        name: build project
        entry: cmake --build build -j 4
        language: system
        pass_filenames: false
        always_run: true

      - id: run-tests
        name: run tests
        entry: bash -c "cd build && if command -v xvfb-run >/dev/null; then xvfb-run --auto-servernum ctest --output-on-failure; else ctest --output-on-failure; fi"
        language: system
        pass_filenames: false
        always_run: true
