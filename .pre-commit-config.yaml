repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=5000']

  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        entry: clang-format -i --style=file
        language: system
        files: \.(cc|h|cpp|hpp)$
        types_or: [c++, c, header]

      - id: cppcheck
        name: cppcheck
        entry: cppcheck --enable=all --suppressions-list=.cppcheck_suppressions --error-exitcode=1 -I include/ src/ tests/
        language: system
        types: [c++]
        pass_filenames: false

      - id: clang-tidy
        name: clang-tidy
        entry: clang-tidy -p build --fix --quiet
        language: system
        files: \.(cc|cpp)$
        types_or: [c++]

      - id: cmake-format
        name: cmake-format
        entry: cmake-format -i
        language: python
        additional_dependencies: [cmakelang]
        files: (CMakeLists\.txt|.*\.cmake)$

      - id: lizard
        name: cyclomatic complexity (lizard)
        entry: lizard src -C 15 -Werror
        language: python
        additional_dependencies: [lizard]
        types: [c++]
        pass_filenames: false

      - id: code-coverage
        name: code coverage (gcovr)
        entry: bash -c "cmake --build build -j $(nproc || sysctl -n hw.ncpu) && cd build && ctest --output-on-failure && gcovr -r .. --exclude-throw-branches"
        language: python
        additional_dependencies: [gcovr]
        always_run: true
        pass_filenames: false

      - id: doxygen
        name: generate documentation (doxygen)
        entry: cmake --build build --target doc
        language: system
        always_run: true
        pass_filenames: false
