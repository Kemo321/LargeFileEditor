name: C++ CI (Ubuntu 24.04)

on:
  push:
    branches: [ main, master, dev, ci-and-tools ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential cmake qt6-base-dev libgl1-mesa-dev \
            libgtest-dev clang-format clang-tidy cppcheck xvfb doxygen graphviz

      - name: Install Python Tools
        run: |
          pip install pre-commit lizard gcovr cmakelang

      - name: Configure CMake (for Clang-Tidy Database)
        run: |
          # Clang-tidy z Twojego pre-commita wymaga folderu build i bazy JSON
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_PREFIX_PATH=/usr/lib/x86_64-linux-gnu/cmake/Qt6

      - name: Run Pre-commit Hooks
        # To uruchamia dokładnie to, co masz w .pre-commit-config.yaml
        run: pre-commit run --all-files

      - name: Build Project
        run: cmake --build build -j $(nproc)

      - name: Run Tests (with Coverage)
        run: |
          cd build
          # Uruchomienie testów z wirtualnym ekranem dla Qt
          xvfb-run --auto-servernum ctest --output-on-failure

      - name: Generate Code Coverage Report
        run: |
          # Generowanie raportu na podstawie plików stworzonych podczas testów
          gcovr -r . --exclude-throw-branches --print-summary -o build/coverage.txt
          cat build/coverage.txt

      - name: Check Cyclomatic Complexity (Lizard)
        run: |
          lizard src -C 15 -Werror

      - name: Generate Documentation (Doxygen)
        run: |
          # Uruchomienie Doxygena (zakładając, że masz target 'doc' w CMake)
          cmake --build build --target doc || echo "Doxygen target not found, skipping."
