name: C++ CI (Ubuntu 24.04)

on:
  push:
    branches: [ main, master, dev, ci-and-tools ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential cmake qt6-base-dev libgl1-mesa-dev \
            libgtest-dev clang-format-15 clang-tidy cppcheck xvfb doxygen

      - name: Install Python Tools
        run: pip install gcovr cmakelang lizard

      - name: Run Clang-Format Check
        run: |
          find src include tests -type f \( -name "*.cc" -o -name "*.h" -o -name "*.cpp" -o -name "*.hpp" \) | xargs --no-run-if-empty clang-format-15 --style=file --dry-run --Werror

      - name: Run CMake-Format Check
        run: |
          find . -name "extern" -prune -o -type f \( -name "CMakeLists.txt" -o -name "*.cmake" \) -print | xargs --no-run-if-empty cmake-format --check

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_PREFIX_PATH=/usr/lib/x86_64-linux-gnu/cmake/Qt6

      - name: Static Analysis (Cppcheck)
        run: |
          cppcheck --enable=all --suppressions-list=.cppcheck_suppressions --error-exitcode=1 -I include/ src/ tests/ --exclude=extern

      - name: Static Analysis (Clang-Tidy)
        run: |
          find src tests -type f \( -name "*.cc" -o -name "*.cpp" \) | xargs --no-run-if-empty clang-tidy -p build --quiet

      - name: Complexity Check (Lizard)
        run: lizard src tests -C 15 -Werror

      - name: Build Project
        run: cmake --build build -j $(nproc)

      - name: Generate Documentation (Doxygen)
        run: cmake --build build --target doc

      - name: Run Tests
        run: |
          cd build
          xvfb-run --auto-servernum ctest --output-on-failure

      - name: Code Coverage Summary
        run: |
          gcovr -r . --exclude-throw-branches --exclude 'extern/.*' --print-summary
