name: C++ CI (Ubuntu 24.04)

on:
  push:
    branches: [ main, master, dev, ci-and-tools ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential cmake qt6-base-dev libgl1-mesa-dev \
            libgtest-dev clang-format-15 clang-tidy cppcheck xvfb doxygen

      - name: Install Pre-commit
        run: pip install pre-commit

      - name: Run Single Source of Truth (Pre-commit)
        run: pre-commit run --all-files
