name: C++ CI (Ubuntu 24.04)

on:
  push:
    branches: [ main, master, dev, ci-and-tools ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential cmake qt6-base-dev libgl1-mesa-dev \
            libgtest-dev clang-format clang-tidy cppcheck xvfb

      - name: Install Python Tools
        run: pip install gcovr

      - name: Run Formatting Check (Clang-Format)
        run: |
          find src include tests -name "*.cc" -o -name "*.h" | xargs clang-format --dry-run --Werror

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_PREFIX_PATH=/usr/lib/x86_64-linux-gnu/cmake/Qt6

      - name: Static Analysis (Cppcheck)
        run: |
          cppcheck --enable=all --suppressions-list=.cppcheck_suppressions --error-exitcode=1 -I include/ src/

      - name: Static Analysis (Clang-Tidy)
        run: |
          # Wykorzystujemy bazę JSON wygenerowaną przez CMake
          # Sprawdzamy tylko pliki źródłowe .cc
          find src -name "*.cc" | xargs clang-tidy -p build --quiet

      - name: Build Project
        run: cmake --build build -j $(nproc)

      - name: Run Tests (with Virtual Display)
        run: |
          cd build
          xvfb-run --auto-servernum ctest --output-on-failure

      - name: Code Coverage Summary
        run: |
          gcovr -r . --exclude-throw-branches --print-summary
